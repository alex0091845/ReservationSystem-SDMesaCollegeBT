<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prototype Login Page</title>
  <link rel="stylesheet" href="styles/login.css" />
</head>

<body>
  <div class="login-container">
    <h1>Login</h1>

    <label for="email">Email</label>
    <input class="text login-field" id="email" placeholder="Enter your email" />

    <label for="password">Password</label>
    <input class="password login-field" id="password" placeholder="Enter your password" />

    <button id="loginBtn">Login</button>

    <p id="message"></p>
  </div>
  <script src="js/login.js"></script>
</body>

</html>
